<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCHAN — Verify Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      max-width: 420px;
      width: 100%;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #e2e8f0;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Verifying your email...</h2>
    <p id="msg">Please wait a moment.</p>
    <div id="action"></div>
  </div>

  <script>
    async function verifyEmail() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      console.log("🔍 Token from URL:", token ? token.substring(0, 40) + "..." : "NO TOKEN");

      if (!token) {
        document.getElementById('title').textContent = "Missing Token";
        document.getElementById('msg').innerHTML = "Please use the full link from the email.";
        return;
      }

      try {
        const response = await fetch(`https://fchan.onrender.com/api/auth/verify?token=${encodeURIComponent(token)}`);
        const data = await response.json();

        console.log("  Backend Response:", data);

        document.getElementById('spinner').style.display = 'none';

        if (data.success) {
          document.getElementById('title').innerHTML = '  Email Verified Successfully!';
          document.getElementById('msg').innerHTML = 'Your account is now active.<br><br><a href="../index.html" style="color:#0ea5e9; font-weight:bold;">→ Go to Login</a>';
        } else {
          document.getElementById('title').textContent = 'Verification Failed';
          document.getElementById('msg').textContent = data.message || 'Invalid or expired token';
        }
      } catch (err) {
        console.error("  Error:", err);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Connection Error';
        document.getElementById('msg').textContent = 'Could not connect to server.';
      }
    }

    // Run immediately
    verifyEmail();
  </script>
</body>
</html>
