<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCHAN — Verify Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .verify-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-xl);
    }

    .verify-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
    }

    .verify-icon.loading {
      background: rgba(52,152,219,0.1);
      color: var(--info);
    }

    .verify-icon.success {
      background: rgba(39,174,96,0.1);
      color: var(--success);
    }

    .verify-icon.error {
      background: rgba(231,76,60,0.1);
      color: var(--danger);
    }

    .verify-card h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-sm);
    }

    .verify-card p {
      color: var(--text-muted);
      margin-bottom: var(--space-xl);
    }

    .spinner-large {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--info);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="verify-card" id="verifyCard">
    <div class="verify-icon loading" id="verifyIcon">
      <div class="spinner-large"></div>
    </div>
    <h2 id="verifyTitle">Verifying your email...</h2>
    <p id="verifyMsg">Please wait while we verify your account.</p>
    <div id="verifyAction"></div>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/language.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    ThemeManager.init();
    LanguageManager.init();
    lucide.createIcons();

    const API_URL_BASE = (() => {
      const h = window.location.hostname;
      return h === 'localhost' || h === '127.0.0.1'
        ? 'http://localhost:3000/api'
        : `http://${h}:3000/api`;
    })();

    async function verifyToken() {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get('token');

      if (!token) {
        showResult('error', 'Invalid Link',
          'No verification token found in the URL.');
        return;
      }

      try {
        const response = await fetch(
          `${API_URL_BASE}/auth/verify?token=${token}`
        );
        const data = await response.json();

        if (data.success) {
          showResult('success', 'Email Verified!',
            'Your account is now active. You can login to FCHAN.',
            `<a href="index.html" class="btn btn-primary">
               Go to Login
             </a>`
          );
        } else {
          showResult('error', 'Verification Failed',
            data.message || 'Invalid or expired token.',
            `<a href="index.html" class="btn btn-outline">
               Back to Login
             </a>`
          );
        }
      } catch (err) {
        showResult('error', 'Connection Error',
          'Could not connect to the server. Please try again.',
          `<button onclick="verifyToken()" class="btn btn-primary">
             Retry
           </button>`
        );
      }
    }

    function showResult(type, title, message, actionHTML = '') {
      const icon    = document.getElementById('verifyIcon');
      const icons   = {
        success: 'check-circle',
        error:   'x-circle',
        loading: 'loader'
      };

      icon.className = `verify-icon ${type}`;
      icon.innerHTML = `
        <i data-lucide="${icons[type]}"
           style="width:40px;height:40px"></i>
      `;

      document.getElementById('verifyTitle').textContent = title;
      document.getElementById('verifyMsg').textContent   = message;
      document.getElementById('verifyAction').innerHTML  = actionHTML;

      lucide.createIcons();
    }

    // Run verification on page load
    verifyToken();
  </script>
</body>
</html>
